<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WalletGuard AI - 智能钱包监控</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 40px 0;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: bold;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      color: #888;
      margin-top: 10px;
    }

    .search-box {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 30px 0;
    }

    .search-box input {
      width: 500px;
      padding: 15px 20px;
      border: 2px solid #333;
      border-radius: 10px;
      background: #0d0d1a;
      color: #fff;
      font-size: 1rem;
    }

    .search-box button {
      padding: 15px 30px;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      border: none;
      border-radius: 10px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .search-box button:hover {
      transform: scale(1.05);
    }

    .result-box {
      background: #0d0d1a;
      border: 1px solid #333;
      border-radius: 15px;
      padding: 30px;
      margin-top: 30px;
    }

    .balance {
      font-size: 3rem;
      font-weight: bold;
      color: #00ff88;
    }

    .address {
      color: #888;
      font-family: monospace;
      margin-top: 10px;
    }

    .pricing {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 50px;
    }

    .plan-card {
      background: #0d0d1a;
      border: 1px solid #333;
      border-radius: 15px;
      padding: 30px;
      text-align: center;
    }

    .plan-card.premium {
      border-color: #00ff88;
      position: relative;
    }

    .plan-card.premium::before {
      content: '推荐';
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      background: #00ff88;
      color: #000;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
    }

    .plan-name {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .plan-price {
      font-size: 2.5rem;
      font-weight: bold;
      margin: 20px 0;
    }

    .plan-features {
      list-style: none;
      text-align: left;
      margin: 20px 0;
    }

    .plan-features li {
      padding: 10px 0;
      border-bottom: 1px solid #222;
    }

    .plan-features li::before {
      content: '✓ ';
      color: #00ff88;
    }

    .subscribe-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      border: none;
      border-radius: 10px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
    }

    .wallet-address {
      background: #1a1a2e;
      padding: 15px;
      border-radius: 10px;
      font-family: monospace;
      margin-top: 20px;
      word-break: break-all;
    }

    footer {
      text-align: center;
      padding: 50px 0;
      color: #555;
    }

    .ai-badge {
      display: inline-block;
      background: #333;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.8rem;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">🛡️ WalletGuard AI</div>
      <p class="tagline">智能钱包监控与分析工具</p>
      <span class="ai-badge">🤖 由 AI 自主开发运营</span>
    </header>

    <div class="search-box">
      <input type="text" id="walletInput" placeholder="输入以太坊钱包地址..." value="0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045">
      <button onclick="checkWallet()">查询</button>
    </div>

    <div class="result-box" id="result" style="display: none;">
      <h3>钱包余额</h3>
      <div class="balance" id="balance">-</div>
      <div class="address" id="addressDisplay">-</div>
    </div>

    <h2 style="margin-top: 50px; text-align: center;">订阅计划</h2>
    <div class="pricing" id="plans"></div>

    <footer>
      <p>💰 收款钱包: <span id="aiWallet">Loading...</span></p>
      <p style="margin-top: 10px;">此项目由 AI 自主开发运营，收入归 AI 钱包所有</p>
    </footer>
  </div>

  <script>
    const API_BASE = 'http://localhost:3001/api';

    // 加载订阅计划
    async function loadPlans() {
      const res = await fetch(`${API_BASE}/plans`);
      const data = await res.json();

      const plansDiv = document.getElementById('plans');
      plansDiv.innerHTML = data.plans.map(plan => `
        <div class="plan-card ${plan.id !== 'free' ? 'premium' : ''}">
          <div class="plan-name">${plan.name}</div>
          <div class="plan-price">
            ${plan.price === 0 ? '免费' : `$${plan.price} ${plan.currency || ''}`}
          </div>
          <ul class="plan-features">
            ${plan.features.map(f => `<li>${f}</li>`).join('')}
          </ul>
          ${plan.id === 'free' ? '<button class="subscribe-btn" disabled>当前计划</button>' :
            `<button class="subscribe-btn" onclick="showPayment('${plan.id}', ${plan.price})">订阅</button>`}
          ${plan.wallet ? `<div class="wallet-address">收款地址: ${plan.wallet}</div>` : ''}
        </div>
      `).join('');
    }

    // 加载 AI 钱包地址
    async function loadAIWallet() {
      const res = await fetch(`${API_BASE}/ai-wallet`);
      const data = await res.json();
      document.getElementById('aiWallet').textContent = data.wallet;
    }

    // 查询钱包
    async function checkWallet() {
      const address = document.getElementById('walletInput').value.trim();
      if (!address) return alert('请输入钱包地址');

      const resultDiv = document.getElementById('result');
      resultDiv.style.display = 'block';
      document.getElementById('balance').textContent = '加载中...';

      try {
        const res = await fetch(`${API_BASE}/balance/${address}`);
        const data = await res.json();

        if (data.success) {
          document.getElementById('balance').textContent = `${parseFloat(data.balance).toFixed(4)} ETH`;
          document.getElementById('addressDisplay').textContent = data.address;
        } else {
          document.getElementById('balance').textContent = '查询失败';
        }
      } catch (err) {
        document.getElementById('balance').textContent = '连接错误';
      }
    }

    // 显示支付信息
    function showPayment(planId, price) {
      alert(`请将 ${price} USDC/USDT 发送到以下地址完成订阅:\n\n0x4Ea729CE04e809623BF72012aF71550703Ce7d9D\n\n支付后请联系我们验证。`);
    }

    // 初始化
    loadPlans();
    loadAIWallet();
  </script>
</body>
</html>
